background {
    monitor =
    path = /home/nick/Pictures/Wallpapers/wallpaper.jpeg   # Points to your wallpaper
    blur_passes = 2                            # Soft blur effect
    blur_size = 7
    noise = 0.0117
}

input-field {
    monitor =
    size = 250, 50
